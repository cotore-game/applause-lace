name: Create Installer and Zip

on:
  workflow_call:
    inputs:
      version:
        description: 'Installer version'
        required: true
        type: string
      app-name:
        description: 'Application name'
        required: true
        type: string
      app-publisher:
        description: 'Publisher name'
        required: true
        type: string
      repo-url:
        description: 'Repository URL (e.g. https://github.com/org/repo)'
        required: true
        type: string
      unity-artifact-name:
        description: 'Unity build artifact name to download'
        required: true
        type: string

jobs:
  create-installer:
    name: Package Asset and Installer
    runs-on: windows-latest

    steps:
      # .iss ファイルを取得するためにチェックアウトが必要
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Unity Build
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.unity-artifact-name }}
          path: build/StandaloneWindows64/

      - name: Remove Development-Only Folders
        shell: powershell
        run: |
          Get-ChildItem -Path "build/StandaloneWindows64" -Recurse -Directory |
            Where-Object {
              $_.Name -like "*DoNotShip*" -or
              $_.Name -like "*_BackUpThisFolder_ButDontShipItWithYourGame"
            } |
            ForEach-Object {
              Write-Host "Removing: $($_.FullName)"
              Remove-Item -Path $_.FullName -Recurse -Force
            }
          Write-Host "Development folders removed successfully"

      - name: Create Zip Archive
        shell: powershell
        run: |
          $version = "${{ inputs.version }}"
          $appName = "${{ inputs.app-name }}"
          New-Item -ItemType Directory -Force -Path installer
          # 中身だけを対象にする
          Compress-Archive -Path "build/StandaloneWindows64/*" `
            -DestinationPath "installer/$appName-v$version.zip" -Force
          Write-Host "Zip archive created: installer/$appName-v$version.zip"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y

      - name: Build Installer
        shell: powershell
        run: |
          $version     = "${{ inputs.version }}"
          $appName     = "${{ inputs.app-name }}"
          $publisher   = "${{ inputs.app-publisher }}"
          $repoUrl     = "${{ inputs.repo-url }}"

          # .iss からの相対パスのズレを防ぐ
          $outputDir = (Resolve-Path "installer").Path
          $issPath   = (Resolve-Path ".github\installer\setup.iss").Path

          Write-Host "Building installer..."
          Write-Host "  ISS : $issPath"
          Write-Host "  Out : $outputDir"

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=$version" `
            "/DAppName=$appName" `
            "/DAppPublisher=$publisher" `
            "/DAppRepoURL=$repoUrl" `
            "/O$outputDir" `
            $issPath

          if ($LASTEXITCODE -ne 0) {
            Write-Error "ISCC.exe failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          Write-Host "Installer created successfully"

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-v${{ inputs.version }}
          path: installer/
          retention-days: 1
