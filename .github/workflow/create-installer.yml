name: Create Installer and Zip

on:
  workflow_call:
    inputs:
      version:
        description: 'Installer version'
        required: true
        type: string
      unity-artifact-name:
        description: 'Unity build artifact name to download'
        required: true
        type: string

jobs:
  create-installer:
    name: Package Asset and Installer
    runs-on: windows-latest
    
    steps:
      - name: Download Unity Build
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.unity-artifact-name }}
          path: build/StandaloneWindows64/

      - name: Remove Development-Only Folders
        shell: powershell
        run: |
          # DoNotShipフォルダとバックアップフォルダを削除
          Get-ChildItem -Path "build/StandaloneWindows64" -Recurse -Directory | 
            Where-Object { 
              $_.Name -like "*DoNotShip*" -or 
              $_.Name -like "*_BackUpThisFolder_ButDontShipItWithYourGame" 
            } | 
            ForEach-Object {
              Write-Host "Removing: $($_.FullName)"
              Remove-Item -Path $_.FullName -Recurse -Force
            }
          
          Write-Host "Development folders removed successfully"

      - name: Create Zip Archive
        shell: powershell
        run: |
          $version = "${{ inputs.version }}"
          New-Item -ItemType Directory -Force -Path installer
          # 成果物をZipに圧縮（親フォルダを含めず中身だけをターゲットにするため * を使用）
          Compress-Archive -Path "build/StandaloneWindows64/*" -DestinationPath "installer/ApplauseLace-v$version.zip" -Force
          Write-Host "Zip archive created successfully"

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y

      - name: Create Installer Script
        shell: powershell
        run: |
          $version = "${{ inputs.version }}"
          $script = @"
          ; ApplauseLace Installer Script
          ; Generated by GitHub Actions
          
          [Setup]
          ; アプリケーション情報
          AppName=ApplauseLace
          AppVersion=$version
          AppPublisher=cotore-game
          AppPublisherURL=https://github.com/${{ github.repository }}
          AppSupportURL=https://github.com/${{ github.repository }}/issues
          AppUpdatesURL=https://github.com/${{ github.repository }}/releases
          
          ; インストール先
          DefaultDirName={autopf}\ApplauseLace
          DefaultGroupName=ApplauseLace
          
          ; 出力設定
          OutputDir=installer
          OutputBaseFilename=ApplauseLace-Setup-v$version
          
          ; 圧縮設定
          Compression=lzma2
          SolidCompression=yes
          
          ; アーキテクチャ
          ArchitecturesInstallIn64BitMode=x64
          ArchitecturesAllowed=x64
          
          ; アンインストール情報（アプリ一覧での表示名にバージョンを含めない）
          UninstallDisplayName=ApplauseLace
          UninstallDisplayIcon={app}\ApplauseLace.exe
          
          ; ウィザード設定
          WizardStyle=modern
          DisableProgramGroupPage=yes
          
          ; 言語選択（日本語環境なら日本語、それ以外は英語）
          ShowLanguageDialog=auto
          
          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"
          Name: "japanese"; MessagesFile: "compiler:Languages\Japanese.isl"
          
          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked
          Name: "quicklaunchicon"; Description: "{cm:CreateQuickLaunchIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked; OnlyBelowVersion: 6.1; Check: not IsAdminInstallMode
          
          [Files]
          Source: "build\StandaloneWindows64\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs
          
          [Icons]
          ; スタートメニュー（常に作成）
          Name: "{group}\ApplauseLace"; Filename: "{app}\ApplauseLace.exe"
          Name: "{group}\{cm:UninstallProgram,ApplauseLace}"; Filename: "{uninstallexe}"
          
          ; デスクトップアイコン（ユーザーが選択した場合のみ）
          Name: "{autodesktop}\ApplauseLace"; Filename: "{app}\ApplauseLace.exe"; Tasks: desktopicon
          
          ; クイック起動（ユーザーが選択した場合のみ、Windows 7以前）
          Name: "{userappdata}\Microsoft\Internet Explorer\Quick Launch\ApplauseLace"; Filename: "{app}\ApplauseLace.exe"; Tasks: quicklaunchicon
          
          [Run]
          Filename: "{app}\ApplauseLace.exe"; Description: "{cm:LaunchProgram,ApplauseLace}"; Flags: nowait postinstall skipifsilent
          
          [CustomMessages]
          english.LaunchProgram=Launch %1
          japanese.LaunchProgram=%1 を起動する
          "@
          
          # 文字化け対策: .NET の WriteAllText を使って、Inno Setup が正常に解釈できる BOM 付き UTF-8 で保存する
          [System.IO.File]::WriteAllText("installer-script.iss", $script, [System.Text.Encoding]::UTF8)
          Write-Host "installer-script.iss created with UTF-8 BOM encoding"

      - name: Build Installer
        shell: powershell
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer-script.iss

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-v${{ inputs.version }}
          path: installer/
          retention-days: 1
